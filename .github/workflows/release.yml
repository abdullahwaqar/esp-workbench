name: release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                      ext: ""
                    - goos: darwin
                      goarch: arm64
                      ext: ""
                    - goos: windows
                      goarch: amd64
                      ext: ".exe"
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.22"
                  cache: true

            - name: set version vars
              run: |
                  echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
                  echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

            - name: build
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: 0
              run: |
                  mkdir -p dist
                  out=esp-workbench-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
                  go build -ldflags "-X main.Version=${VERSION} -X 'main.BuildTime=${BUILD_TIME}'" -o dist/${out} ./cmd/app
                  cd dist
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    zip ${out}.zip ${out}
                    rm ${out}
                  else
                    tar czf ${out}.tar.gz ${out}
                    rm ${out}
                  fi

            - uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/*

    release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
                  generate_release_notes: true
